<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gs rubavu | Excellence in Education</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Gs rubavu - Teacher Training College">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gs rubavu">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/favicon.svg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gs-dark': '#1e3a8a',
                        'gs-accent': '#3b82f6',
                        'gs-cream': '#ffffff',
                        'gs-gold': '#64748b',
                        'gs-text': '#1e293b',
                        'gs-light': '#eff6ff',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Lato"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
</head>
<body>
    <div id="preloader" class="fixed inset-0 bg-gradient-to-br from-[#1e3a8a] to-[#3b82f6] flex flex-col items-center justify-center z-[9999]">
        <div class="w-56 h-56 border-4 border-white/30 rounded-full flex items-center justify-center animate-[pulse_2s_ease-in-out_infinite] shadow-[0_0_60px_rgba(59,130,246,0.5)]">
            <span class="font-serif text-2xl font-bold text-white tracking-widest drop-shadow-lg">GS RUBAVU</span>
        </div>
        <p class="mt-8 text-sm text-white/70 tracking-[0.3em] uppercase animate-pulse">Loading...</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(function() {
                    document.getElementById('preloader').style.display = 'none';
                }, 500);
            }, 3000);
        });
    </script>
</body>
</html>
